# ---------------------------------------------------------------
# RAG Service proxy — add this block inside your existing
# nginx server { } block (see alfresco-deployment/config/nginx.conf)
# ---------------------------------------------------------------

# RAG Service Proxy
# Routes /api/rag/* to the rag-service container.
location /api/rag/ {
  proxy_pass http://rag-service:9091/api/rag/;
}

# Content Lake node status Proxy
# Routes /api/content-lake/* to the batch-ingester container.
location /api/content-lake/ {
  proxy_pass http://batch-ingester:9090/api/content-lake/;
}
